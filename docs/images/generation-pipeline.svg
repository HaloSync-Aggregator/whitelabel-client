  <text x="676" y="66" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fdcb6e" letter-spacing="1.5">STAGE 3</text>
  <text x="676" y="90" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#1a1a2e">Pages</text>
  <text x="676" y="108" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#e8b85b">app-builder</text>
  <line x1="676" y1="120" x2="860" y2="120" stroke="#f0eade" stroke-width="1"/>

