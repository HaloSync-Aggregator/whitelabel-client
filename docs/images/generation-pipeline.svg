<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="920" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="100%" stop-color="#f0f2f8"/>
    </linearGradient>
    <linearGradient id="stage1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#8c82fc"/>
    </linearGradient>
    <linearGradient id="stage2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#e8608e"/>
    </linearGradient>
    <linearGradient id="stage3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#e8b85b"/>
    </linearGradient>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="280" rx="16" fill="url(#bg2)"/>

  <!-- Stage 1: Design System -->
