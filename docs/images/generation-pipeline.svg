    <text x="366" y="169" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fd79a8" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="386" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">FlightCard, SeatMap</text>

  <g>
    <rect x="366" y="186" width="12" height="12" rx="2" fill="#fef0f5"/>
    <text x="366" y="195" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fd79a8" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="386" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">Forms, Modals, etc.</text>

