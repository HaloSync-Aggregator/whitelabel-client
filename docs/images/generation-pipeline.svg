    <rect x="676" y="134" width="12" height="12" rx="2" fill="#fef9ee"/>
    <text x="676" y="143" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fdcb6e" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="696" y="144" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">Search Page</text>

