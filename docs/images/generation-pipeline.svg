    <rect x="676" y="160" width="12" height="12" rx="2" fill="#fef9ee"/>
    <text x="676" y="169" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fdcb6e" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="696" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">Results Page</text>

  <g>
    <rect x="676" y="186" width="12" height="12" rx="2" fill="#fef9ee"/>
    <text x="676" y="195" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fdcb6e" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="696" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">Booking Page</text>

  <g>
    <rect x="676" y="212" width="12" height="12" rx="2" fill="#fef9ee"/>
    <text x="676" y="221" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fdcb6e" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
  <text x="696" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3d3b5c">Cancel Page</text>
</svg>
