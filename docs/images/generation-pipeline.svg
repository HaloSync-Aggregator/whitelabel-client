  </g>
  <text x="56" y="66" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a29bfe" letter-spacing="1.5">STAGE 1</text>
  <text x="56" y="90" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#1a1a2e">Design System</text>
  <text x="56" y="108" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#8c82fc">design-system-setup</text>
  <line x1="56" y1="120" x2="240" y2="120" stroke="#e8e6f0" stroke-width="1"/>

  <g>
