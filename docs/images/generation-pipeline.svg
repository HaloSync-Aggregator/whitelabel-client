    <rect x="56" y="186" width="12" height="12" rx="2" fill="#f0effe"/>
    <text x="56" y="195" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a29bfe" text-anchor="middle" dx="6">&#x2714;</text>
  </g>
