openapi: 3.0.0
paths:
 /middleware/polarhub/air-shopping:
 post:
 operationId: AirShoppingController_searchFlights
 summary: Search for flights
 description: "\n AirShopping API - Starting point for Prime Booking workflows\n\
 \n Supported workflows:\n - WF_PB_DEFERRED: Deferred ticketing\n\
 \ - WF_PB_IMMEDIATE: Immediate ticketing\n - WF_PB_SEAT: Booking\
 \ with seat selection\n - WF_PB_SERVICE: Booking with ancillary services\n\
 \ - WF_PB_SEAT_SERVICE: Booking with seat and services\n\n **Transaction\
 \ ID**: Generated by FE (pass-through)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/AirShoppingRequestDto'
 responses:
 '200':
 description: Flight offers returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Pre-Booking
 /middleware/polarhub/offer-price:
 post:
 operationId: OfferPriceController_getOfferPrice
 summary: Get detailed pricing for selected offers
 description: "\n OfferPrice API - Get detailed pricing based on workflow\n\
 \n Workflows and additional fields:\n - WF_PB_DEFERRED/IMMEDIATE:\
 \ Basic pricing\n - WF_PB_SEAT: Include SeatSelection in OfferItems\n\
 \ - WF_PB_SERVICE: Include BookingInstructions in OfferItems\n -\
 \ WF_PB_SEAT_SERVICE: Include both SeatSelection and BookingInstructions\n\
 \n **Transaction ID**: Must be same as AirShopping (pass-through from\
 \ FE)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OfferPriceRequestDto'
 responses:
 '200':
 description: Priced offers returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Pre-Booking
 /middleware/polarhub/order:
 post:
 operationId: OrderController_createOrder
 summary: Create a booking
 description: "\n OrderCreate API - Final step for Prime Booking workflows\n\
 \n Required fields:\n - orders: Offer details from OfferPrice\n\
 \ - paxList: Passenger details with Individual, IdentityDoc\n -\
 \ contactInfoList: Contact information (including CTC_TA1 for Travel Agency)\n\
 \ - paymentList: Payment details (required for immediate ticketing)\n\
 \n **Transaction ID**: Must be same as OfferPrice (pass-through from\
 \ FE)\n\n **CRITICAL**: ContactInfo must include Travel Agency contact\
 \ (CTC_TA1)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderCreateRequestDto'
 responses:
 '200':
 description: Order created successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Order
 /middleware/polarhub/order/retrieve:
 post:
 operationId: OrderController_getOrder
 summary: Retrieve order details
 description: "\n OrderRetrieve API - Starting point for all Post-Booking\
 \ workflows\n\n **CRITICAL**: TransactionID should be NEW for post-booking\
 \ session (generated by FE)\n The same TransactionID should be reused\
 \ for the entire post-booking session:\n OrderRetrieve -> SeatAvailability/ServiceList\
 \ -> OrderQuote -> OrderChange\n\n Post-Booking workflows:\n - WF_HELD_*:\
 \ Operations on Hold bookings\n - WF_TKT_*: Operations on Ticketed bookings\n\
 \ "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderRetrieveRequestDto'
 responses:
 '200':
 description: Order details returned successfully
 tags:
 - PolarHub - Order
 /middleware/polarhub/order/cancel:
 post:
 operationId: OrderController_cancelOrder
 summary: Cancel an order
 description: "\n OrderCancel API - Cancel or refund a booking\n\n \
 \ Workflows:\n - WF_HELD_CANCEL: Direct cancel (no RefundQuoteID needed)\n\
 \ - WF_TKT_REFUND: Refund (requires RefundQuoteID from OrderReshop)\n\
 \n **Transaction ID**: Same as OrderRetrieve (pass-through from FE)\n\
 \ "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderCancelRequestDto'
 responses:
 '200':
 description: Order cancelled successfully
 tags:
 - PolarHub - Order
 /middleware/polarhub/order-change:
 post:
 operationId: OrderChangeController_changeOrder
 summary: Change an order
 description: "\n OrderChange API - Modify a booking\n\n Change types\
 \ (ChangeOrderChoice):\n 1. AcceptSelectedQuotedOfferList: Seat/Service\
 \ changes (WF_HELD_SEAT, WF_TKT_SEAT, etc.)\n 2. AcceptOrderItemList:\
 \ Item acceptance\n 3. AcceptRepricedOrder: Confirm/Itinerary changes\
 \ (WF_HELD_CONFIRM, WF_HELD_ITIN)\n 4. UpdatePax: Passenger info changes\
 \ (WF_HELD_PAX)\n - Add mode: NewPaxRefID only\n - Delete\
 \ mode: CurrentPaxRefID only\n - Update mode: Both CurrentPaxRefID\
 \ and NewPaxRefID\n 5. AcceptChange: OCN acceptance (WF_TKT_OCN)\n \
 \ 6. AcceptCancelledOffer: Ancillary refund\n 7. CancelUnpaidOrder:\
 \ Cancel unpaid order\n\n **ReasonCode at Query level** (NOT in ChangeOrderChoice):\n\
 \ - 'DIV': PNR split (WF_HELD_SPLIT)\n - '104': Payment extension\n\
 \n **WF_TKT_VOLCHANGE CRITICAL**: ResponseID is required in AcceptSelectedQuotedOfferList!\n\
 \n **Transaction ID**: Same as OrderRetrieve (pass-through from FE)\n\
 \ "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderChangeRequestDto'
 responses:
 '200':
 description: Order changed successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Post-Booking
 /middleware/polarhub/service-list:
 post:
 operationId: ServiceListController_getServiceList
 summary: Get available ancillary services
 description: "\n ServiceList API - Get available services (baggage, meals,\
 \ etc.)\n\n Supports both phases:\n - **Prime Booking** (WF_PB_SERVICE,\
 \ WF_PB_SEAT_SERVICE): Use 'offer' field\n - **Post-Booking** (WF_HELD_SERVICE,\
 \ WF_TKT_SERVICE): Use 'order' field\n\n Service types:\n - BaggageAllowance:\
 \ Extra baggage\n - Meal: In-flight meals\n - SeatUpgrade: Seat\
 \ upgrades\n - Lounge: Lounge access\n - WiFi: In-flight WiFi\n\n\
 \ **Transaction ID**: Same as AirShopping/OrderRetrieve (pass-through\
 \ from FE)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/ServiceListRequestDto'
 responses:
 '200':
 description: Service list returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Post-Booking
 /middleware/polarhub/seat-availability:
 post:
 operationId: SeatAvailabilityController_getSeatAvailability
 summary: Get available seats
 description: "\n SeatAvailability API - Get seat map with available seats\n\
 \n Supports both phases:\n - **Prime Booking** (WF_PB_SEAT, WF_PB_SEAT_SERVICE):\
 \ Use 'offer' field\n - **Post-Booking** (WF_HELD_SEAT, WF_TKT_SEAT):\
 \ Use 'order' field\n\n Response includes:\n - SeatMap with cabin\
 \ compartments\n - Seat status (Available, Occupied, Blocked)\n \
 \ - Seat characteristics (WINDOW, AISLE, etc.)\n - Seat prices\n\n \
 \ **HELD vs TICKETED difference**:\n - HELD: Can change seat directly\
 \ via OrderChange (no OrderQuote needed)\n - TICKETED: Must go through\
 \ OrderQuote before OrderChange\n\n **Transaction ID**: Same as AirShopping/OrderRetrieve\
 \ (pass-through from FE)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/SeatAvailabilityRequestDto'
 responses:
 '200':
 description: Seat availability returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Post-Booking
 /middleware/polarhub/order-reshop:
 post:
 operationId: OrderReshopController_reshopOrder
 summary: Search for itinerary changes or get refund quote
 description: "\n OrderReshop API - Search for new flights or get refund\
 \ quote\n\n Use cases:\n 1. **Itinerary Change** (WF_HELD_ITIN,\
 \ WF_TKT_VOLCHANGE):\n - Use updateOrder.reshopOrder.serviceOrder.delete\
 \ to specify segments to remove\n - Use updateOrder.reshopOrder.serviceOrder.add\
 \ to specify new segments\n - ActionContext: '8' = Voluntary, '9'\
 \ = Involuntary\n\n 2. **Refund Quote** (WF_TKT_REFUND):\n -\
 \ Use updateOrder.cancelOrderRefId (STRING, not object!)\n - Response\
 \ includes RefundQuoteID for OrderCancel\n\n **CRITICAL**: CancelOrderRefID\
 \ is a STRING type, not an object!\n - WRONG: { cancelOrderRefId: { orderId:\
 \ \"...\" } }\n - CORRECT: { cancelOrderRefId: \"ORDER_ID\" }\n\n \
 \ **Delete structure**: Array of objects with orderItemRefId (single string\
 \ each)\n - { delete: [{ orderItemRefId: \"OI1\" }, { orderItemRefId:\
 \ \"OI2\" }] }\n\n **Transaction ID**: Same as OrderRetrieve (pass-through\
 \ from FE)\n "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderReshopRequestDto'
 responses:
 '200':
 description: Reshop offers or refund quote returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Post-Booking
 /middleware/polarhub/order-quote:
 post:
 operationId: OrderQuoteController_getOrderQuote
 summary: Get pricing quote for changes
 description: "\n OrderQuote API - Get quote for seat/service changes or\
 \ fare recalculation\n\n **Two modes (mutually exclusive)**:\n\n \
 \ 1. **SelectedOffer mode** - Seat/Service change quote:\n - WF_HELD_SERVICE:\
 \ Service change quote for held booking\n - WF_TKT_SEAT: Seat change\
 \ quote for ticketed booking\n - WF_TKT_SERVICE: Service change quote\
 \ for ticketed booking\n - Use 'selectedOffer' field\n\n 2. **RepricedOrderID\
 \ mode** - Fare recalculation for ticketing:\n - WF_HELD_CONFIRM:\
 \ Fare recalculation before ticketing (some airlines: SQ, AY, KL)\n \
 \ - Use 'repricedOrderId' field with OrderID and optional OrderItemRefID\n\
 \n **Optional fields**:\n - affect: Specify affected OrderItems\
 \ and services to retain\n - criteria: Apply special fares/programs\n\
 \ - responseParameter: Set response currency/language\n\n **Workflow\
 \ notes**:\n - WF_HELD_SEAT does NOT need OrderQuote (direct to OrderChange)\n\
 \ - WF_HELD_CONFIRM may or may not need OrderQuote (airline-dependent)\n\
 \n **Transaction ID**: Same as OrderRetrieve (pass-through from FE)\n\
 \ "
 parameters: []
 requestBody:
 required: true
 content:
 application/json:
 schema:
 $ref: '#/components/schemas/OrderQuoteRequestDto'
 responses:
 '200':
 description: Quote returned successfully
 '400':
 description: Invalid request parameters
 tags:
 - PolarHub - Post-Booking
