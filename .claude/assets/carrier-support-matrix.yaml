# carrier-support-matrix.yaml
# PolarHub API - Carrier Support Matrix for AI Reference
# Last Updated: 2025-01

meta:
 support_levels:
 PROD: "Production supported"
 SANDBOX: "Sandbox only"
 PARTIAL: "Partially supported"
 NONE: "Not supported"
 NA: "Not applicable"

# ============================================================
# WORKFLOW DEFINITIONS
# ============================================================
workflows:
 prime_booking:
 deferred_ticketing:
 id: "WF_PB_DEFERRED"
 description: "Create booking, ticket later"
 api_sequence:
 - AirShopping
 - OfferPrice
 - OrderCreate
 requires_fop: false

 immediate_ticketing:
 id: "WF_PB_IMMEDIATE"
 description: "Book and ticket simultaneously"
 api_sequence:
 - AirShopping
 - OfferPrice
 - OrderCreate
 requires_fop: true

 seat_only:
 id: "WF_PB_SEAT"
 description: "Booking with seat selection"
 api_sequence:
 - AirShopping
 - OfferPrice
 - SeatAvailability
 - OrderCreate
 requires_fop: true

 seat_with_reprice:
 id: "WF_PB_SEAT_REPRICE"
 description: "Requires OfferPrice re-call after seat selection (AFKL, TR)"
 api_sequence:
 - AirShopping
 - OfferPrice
 - SeatAvailability
 - OfferPrice # Recalculate with seat included
 - OrderCreate
 requires_fop: true
 carriers: [AF, KL, TR]

 service_only:
 id: "WF_PB_SERVICE"
 description: "Booking with ancillary services"
 api_sequence:
 - AirShopping
 - OfferPrice # 1st: Confirm offer price (obtain ResponseID)
 - ServiceList # Query ancillary service list (requires ResponseID, OfferID)
 - OfferPrice # 2nd: Recalculate price with services
 - OrderCreate
 requires_fop: true
 notes:
 - "ServiceList call requires ResponseID and OfferID, so OfferPrice must be called first"
 - "After service selection, re-call OfferPrice to finalize the price"

 seat_and_service:
 id: "WF_PB_SEAT_SERVICE"
 description: "Booking with seat + ancillary services"
 api_sequence:
 - AirShopping
 - OfferPrice # 1st: Confirm offer price (obtain ResponseID)
 - SeatAvailability # Seat availability query
 - ServiceList # Ancillary service list query
 - OfferPrice # 2nd: Recalculate price with seat + services
 - OrderCreate
 requires_fop: true
 notes:
 - "Both SeatAvailability and ServiceList require ResponseID"
 - "After seat + service selection, re-call OfferPrice to finalize the price"

 post_booking_held:
 seat_change:
 id: "WF_HELD_SEAT"
 description: "Change seat while in Hold status"
 api_sequence:
 - OrderRetrieve
 - SeatAvailability
 - OrderChange

 add_service:
 id: "WF_HELD_SERVICE"
 description: "Add service while in Hold status"
 api_sequence:
 - OrderRetrieve
 - ServiceList
 - OrderQuote
 - OrderChange

 confirm:
 id: "WF_HELD_CONFIRM"
 description: "Confirm held booking (ticketing)"
 api_sequence:
 - OrderRetrieve
 - OrderChange
 requires_fop: true

 cancel:
 id: "WF_HELD_CANCEL"
 description: "Cancel held booking"
 api_sequence:
 - OrderRetrieve
 - OrderCancel

 itinerary_change:
 id: "WF_HELD_ITIN"
 description: "Change itinerary while in Hold status"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderChange

 pax_info_change:
 id: "WF_HELD_PAX"
 description: "Change passenger info while in Hold status"
 api_sequence:
 - OrderRetrieve
 - OrderChange

 pnr_split:
 id: "WF_HELD_SPLIT"
 description: "PNR split"
 api_sequence:
 - OrderRetrieve
 - OrderChange

 post_booking_ticketed:
 seat_change:
 id: "WF_TKT_SEAT"
 description: "Change seat after ticketing"
 api_sequence:
 - OrderRetrieve
 - SeatAvailability
 - OrderQuote
 - OrderChange

 add_service:
 id: "WF_TKT_SERVICE"
 description: "Add service after ticketing"
 api_sequence:
 - OrderRetrieve
 - ServiceList
 - OrderQuote
 - OrderChange

 voluntary_change:
 id: "WF_TKT_VOLCHANGE"
 description: "Voluntary itinerary change"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderChange

 voluntary_refund:
 id: "WF_TKT_REFUND"
 description: "Voluntary refund"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderCancel

 ocn_accept:
 id: "WF_TKT_OCN"
 description: "Accept involuntary change (OCN)"
 api_sequence:
 - OrderRetrieve
 - OrderChange

