# ============================================================
# LOOKUP FUNCTIONS (Pseudo-code for AI reference)
# ============================================================
lookup_helpers:
 get_workflow_for_action:
 description: "주진 amount션 vs workflow return"
 logic: |
 if action == "book_with_seat":
 return workflows.prime_booking.seat_only
 elif action == "book_with_service":
 return workflows.prime_booking.service_only
 elif action == "refund":
 return workflows.post_booking_ticketed.voluntary_refund
 # ... etc

 is_supported:
 description: "airline specific workflow support 여부 confirm"
 logic: |
 def is_supported(carrier_code, workflow_id):
 level = carriers[carrier_code].support[workflow_id]
 return level in ["PROD", "PARTIAL"]

 get_api_sequence:
 description: "workflow API call order return"
 logic: |
 def get_api_sequence(workflow_id):
 for category in workflows:
 for wf_name, wf_data in workflows[category].items():
 if wf_data.id == workflow_id:
 return wf_data.api_sequence
 return None

# ============================================================
# DECISION TREE FOR WORKFLOW SELECTION
# ============================================================
decision_tree:
 booking_phase:
 - condition: "order_status == null"
 phase: "prime_booking"
 - condition: "order_status == 'HELD'"
 phase: "post_booking_held"
 - condition: "order_status == 'TICKETED'"
 phase: "post_booking_ticketed"

 prime_booking_workflow:
 - condition: "!needs_seat && !needs_service && !immediate_ticketing"
 workflow: "WF_PB_DEFERRED"
 - condition: "!needs_seat && !needs_service && immediate_ticketing"
 workflow: "WF_PB_IMMEDIATE"
 - condition: "needs_seat && !needs_service"
 workflow: "WF_PB_SEAT"
 - condition: "!needs_seat && needs_service"
 workflow: "WF_PB_SERVICE"
 - condition: "needs_seat && needs_service"
 workflow: "WF_PB_SEAT_SERVICE"

 post_booking_workflow:
 - condition: "action == 'change_seat'"
 workflow_held: "WF_HELD_SEAT"
 workflow_ticketed: "WF_TKT_SEAT"
 - condition: "action == 'add_service'"
 workflow_held: "WF_HELD_SERVICE"
 workflow_ticketed: "WF_TKT_SERVICE"
 - condition: "action == 'confirm'"
 workflow_held: "WF_HELD_CONFIRM"
 - condition: "action == 'cancel'"
 workflow_held: "WF_HELD_CANCEL"
 - condition: "action == 'change_itinerary'"
 workflow_held: "WF_HELD_ITIN"
 workflow_ticketed: "WF_TKT_VOLCHANGE"
 - condition: "action == 'refund'"
 workflow_ticketed: "WF_TKT_REFUND"

