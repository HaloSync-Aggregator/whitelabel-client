# carrier-support-matrix.yaml
# PolarHub API - Carrier Support Matrix for AI Reference
# Last Updated: 2025-01

meta:
 support_levels:
 PROD: "Production supported"
 SANDBOX: "Sandbox only"
 PARTIAL: "Partially supported"
 NONE: "Not supported"
 NA: "Not applicable"

# ============================================================
# WORKFLOW DEFINITIONS
# ============================================================
workflows:
 prime_booking:
 deferred_ticketing:
 id: "WF_PB_DEFERRED"
 description: "Booking after creation 나During Ticketing"
 api_sequence:
 - AirShopping
 - OfferPrice
 - OrderCreate
 requires_fop: false

 immediate_ticketing:
 id: "WF_PB_IMMEDIATE"
 description: "Booking and in Concurrent Ticketing"
 api_sequence:
 - AirShopping
 - OfferPrice
 - OrderCreate
 requires_fop: true

 seat_only:
 id: "WF_PB_SEAT"
 description: "Seat selection Include Booking"
 api_sequence:
 - AirShopping
 - OfferPrice
 - SeatAvailability
 - OrderCreate
 requires_fop: true

 service_only:
 id: "WF_PB_SERVICE"
 description: "Ancillary service Include Booking"
 api_sequence:
 - AirShopping
 - OfferPrice # 1: offer Price Confirmed (ResponseID 획득)
 - ServiceList # Ancillary service List Retrieval (ResponseID, OfferID Required)
 - OfferPrice # 2: Service Include Price Re-Calculate
 - OrderCreate
 requires_fop: true
 notes:
 - "ServiceList in Call ResponseID, OfferID to Requiredso OfferPrice pre행 Required"
 - "Service after Select OfferPrice Re-using Call Final Price Confirmed"

 seat_and_service:
 id: "WF_PB_SEAT_SERVICE"
 description: "Seat + Ancillary service Include Booking"
 api_sequence:
 - AirShopping
 - OfferPrice # 1: offer Price Confirmed (ResponseID 획득)
 - SeatAvailability # Seat Retrieval
 - ServiceList # Ancillary service List Retrieval
 - OfferPrice # 2: Seat+Service Include Price Re-Calculate
 - OrderCreate
 requires_fop: true
 notes:
 - "SeatAvailability, ServiceList All ResponseID Required"
 - "Seat+Service after Select OfferPrice Re-using Call Final Price Confirmed"

 post_booking_held:
 seat_change:
 id: "WF_HELD_SEAT"
 description: "Hold from Status Seat change"
 api_sequence:
 - OrderRetrieve
 - SeatAvailability
 - OrderChange

 add_service:
 id: "WF_HELD_SERVICE"
 description: "Hold from Status Add service"
 api_sequence:
 - OrderRetrieve
 - ServiceList
 - OrderQuote
 - OrderChange

 confirm:
 id: "WF_HELD_CONFIRM"
 description: "Hold Booking Confirmed (Ticketing)"
 api_sequence:
 - OrderRetrieve
 - OrderChange
 requires_fop: true

 cancel:
 id: "WF_HELD_CANCEL"
 description: "Hold Booking cancellation"
 api_sequence:
 - OrderRetrieve
 - OrderCancel

 itinerary_change:
 id: "WF_HELD_ITIN"
 description: "Hold from Status schedule Change"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderChange

 pax_info_change:
 id: "WF_HELD_PAX"
 description: "Hold from Status Passenger Information change"
 api_sequence:
 - OrderRetrieve
 - OrderChange

 pnr_split:
 id: "WF_HELD_SPLIT"
 description: "PNR Split"
 api_sequence:
 - OrderRetrieve
 - OrderChange

 post_booking_ticketed:
 seat_change:
 id: "WF_TKT_SEAT"
 description: "After ticketing Seat change"
 api_sequence:
 - OrderRetrieve
 - SeatAvailability
 - OrderQuote
 - OrderChange

 add_service:
 id: "WF_TKT_SERVICE"
 description: "After ticketing Add service"
 api_sequence:
 - OrderRetrieve
 - ServiceList
 - OrderQuote
 - OrderChange

 voluntary_change:
 id: "WF_TKT_VOLCHANGE"
 description: "occurrence-like schedule Change"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderChange

 voluntary_refund:
 id: "WF_TKT_REFUND"
 description: "occurrence-like Refund"
 api_sequence:
 - OrderRetrieve
 - OrderReshop
 - OrderCancel

 ocn_accept:
 id: "WF_TKT_OCN"
 description: "비occurrence-like Change(OCN) 수락"
 api_sequence:
 - OrderRetrieve
 - OrderChange

